<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#000000" />
  
  <g transform="translate(50, 50)">
    <!-- Central Star -->
    <circle cx="0" cy="0" r="8" fill="#00ffff">
      <animate attributeName="opacity" values="0.7; 1; 0.7" dur="1s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Outer Flare Ring 1 -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="#00ffff" stroke-width="2" stroke-dasharray="10 40 20 50">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Outer Flare Ring 2 -->
    <circle cx="0" cy="0" r="26" fill="none" stroke="rgba(0,255,255,0.4)" stroke-width="1.5" stroke-dasharray="30 60 10 20">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
