<svg width="200" height="200" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#000000" />
  
  <g>
    <!-- Blade 1 (Longest/Fastest) -->
    <!-- Thins out significantly after the elbow to a sharp point -->
    <path d="M 20 80 L 40 40 L 70 16 L 72 18 L 46 40 L 26 80 Z" fill="#00ffff" />
    
    <!-- Blade 2 (Mid) -->
    <!-- Elbow and upper tip section are proportionally shorter -->
    <path d="M 34 80 L 49 50 L 74 30 L 76 32 L 55 50 L 40 80 Z" fill="rgba(0,255,255,0.7)" />
    
    <!-- Blade 3 (Short) -->
    <path d="M 48 80 L 58 60 L 78 44 L 80 46 L 64 60 L 54 80 Z" fill="rgba(0,255,255,0.4)" />
    
    <!-- Blade 4 (Extra Short) -->
    <path d="M 62 80 L 67 70 L 82 58 L 84 60 L 73 70 L 68 80 Z" fill="rgba(0,255,255,0.2)" />
  </g>
</svg>
