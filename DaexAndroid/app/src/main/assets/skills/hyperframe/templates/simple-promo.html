<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DAEX Promo Template</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #030303;
      color: #ffffff;
      overflow: hidden;
    }
    #root {
      position: relative;
      width: 1080px;
      height: 1920px;
      background: radial-gradient(circle at 50% 30%, #0d0b21 0%, #030206 70%);
      border: 4px solid rgba(0, 242, 254, 0.15);
      overflow: hidden;
      box-shadow: 0 0 100px rgba(0, 242, 254, 0.05);
    }
    .clip { position: absolute; opacity: 0; }

    /* Background grid */
    .grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(rgba(0, 242, 254, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 242, 254, 0.05) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      opacity: 1;
    }

    /* Glow circles */
    .glow-circle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
      pointer-events: none;
      opacity: 1;
    }
    .glow-circle.one {
      top: 20%;
      left: 10%;
      width: 600px;
      height: 600px;
    }
    .glow-circle.two {
      bottom: 10%;
      right: -10%;
      width: 800px;
      height: 800px;
    }

    /* Core typography and UI panels */
    .badge {
      top: 250px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 242, 254, 0.08);
      border: 1px solid rgba(0, 242, 254, 0.3);
      padding: 12px 24px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 28px;
      letter-spacing: 6px;
      color: #00f2fe;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .title {
      top: 500px;
      left: 10%;
      width: 80%;
      font-family: 'Orbitron', sans-serif;
      font-size: 76px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .title span {
      background: linear-gradient(90deg, #00f2fe, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .glowing-divider {
      top: 820px;
      left: 10%;
      width: 80%;
      height: 3px;
      background: linear-gradient(90deg, #00f2fe, transparent);
      box-shadow: 0 0 10px #00f2fe;
    }

    .subtitle {
      top: 860px;
      left: 10%;
      width: 80%;
      font-family: 'Share Tech Mono', monospace;
      font-size: 32px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.7);
    }

    .footer {
      bottom: 200px;
      left: 10%;
      width: 80%;
      display: flex;
      justify-content: space-between;
      font-family: 'Share Tech Mono', monospace;
      font-size: 24px;
      color: rgba(255, 255, 255, 0.4);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 30px;
    }
  </style>
</head>
<body>
  <!-- Root Hyperframe Element -->
  <div id="root" data-composition-id="simple-promo" data-width="1080" data-height="1920" data-duration="5">
    <div class="grid"></div>
    <div class="glow-circle one"></div>
    <div class="glow-circle two"></div>

    <!-- Timeline Animated Elements -->
    <div id="badge" class="clip badge" data-start="0.5" data-duration="4.5" data-track-index="2" data-anim="scale-in">System status: active</div>
    <h1 id="title" class="clip title" data-start="1.0" data-duration="4.0" data-track-index="2" data-anim="fade-up">
      DAEDALUS<br><span>EXECUTION CLIENT</span>
    </h1>
    <div id="divider" class="clip glowing-divider" data-start="1.8" data-duration="3.2" data-track-index="1" data-anim="slide-left"></div>
    <p id="subtitle" class="clip subtitle" data-start="1.6" data-duration="3.4" data-track-index="2" data-anim="fade-up">
      Edge-optimized vector intelligence powered by on-device acceleration mappings.
    </p>

    <div id="footer" class="clip footer" data-start="3.0" data-duration="2.0" data-track-index="1" data-anim="fade-up">
      <span>REF. DAEX.v1</span>
      <span>00:05</span>
    </div>
  </div>
</body>
</html>
