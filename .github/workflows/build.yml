name: DAEX CI

on:
  push:
    branches: [main, needs-fix, gradle-test-ci]
  pull_request:
    branches: [main, needs-fix]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  ANDROID_API: 34

jobs:
  # ─── Unit Tests ───────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Run unit tests
        working-directory: DaexAndroid
        run: ./gradlew test --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: DaexAndroid/app/build/reports/tests/test/
          retention-days: 7

  # ─── C++ Bridge Compilation ───────────────────────────────────────────────
  cpp-compile:
    name: C++ Bridge (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, x86_64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28

      - name: Build C++ bridge
        working-directory: DaexLlama/src/main/cpp
        run: |
          cmake -B build \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API }} \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DGEMM_LOWPRECISION=OFF
          cmake --build build --target daex-llama -j$(nproc)

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: libdaex-llama-${{ matrix.abi }}
          path: DaexLlama/src/main/cpp/build/libdaex-llama.so
          retention-days: 7

  # ─── Full Gradle Build ────────────────────────────────────────────────────
  gradle-build:
    name: Gradle Build (APK)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Accept licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Install SDK components
        run: $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Assemble APK
        working-directory: DaexAndroid
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daex-debug-apk
          path: DaexAndroid/app/build/outputs/apk/debug/*.apk
          retention-days: 7
